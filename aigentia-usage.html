<!-- ============================================================
  AiGENTiA — Website Usage
  ============================================================

  1. SIMPLEST: drop an animated SVG as an <img>
     Works in any browser, any framework, no JS needed.

     <img src="aigentia-mark-animated-deep.svg"
          alt="AiGENTiA" width="92" height="92">

  ────────────────────────────────────────────────────────────

  2. FULL LOCKUP on a light background:

     <link rel="stylesheet" href="aigentia-tokens.css">
     <link rel="stylesheet" href="aigentia-brand.css">

     <div class="ag-lockup ag-light">
       <div class="ag-mark ag-animated">
         <!-- paste aigentia-mark-deep.svg inline here -->
       </div>
       <div class="ag-text">
         <div class="ag-name-half">
           <div class="ag-name">
             <span>A</span><span>i</span><span>G</span><span>E</span>
             <span>N</span><span>T</span><span>i</span><span>A</span>
           </div>
         </div>
         <div class="ag-accent"></div>
         <div class="ag-tag-half">
           <div class="ag-tag">
             <span>I</span><span>N</span><span>T</span><span>E</span>
             <span>L</span><span>L</span><span>I</span><span>G</span>
             <span>E</span><span>N</span><span>T</span>
             <span class="ag-w"></span>
             <span>A</span><span>G</span><span>E</span><span>N</span>
             <span>C</span><span>Y</span>
           </div>
         </div>
       </div>
     </div>

  ────────────────────────────────────────────────────────────

  3. DARK background: change ag-light → ag-dark
     and swap the SVG for aigentia-mark-cream.svg inline.

  ============================================================ -->
