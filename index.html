  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep:   #221D5C;
      --cream:  #F6F1E7;
      --bronze: #5E4B38;
    }

    html, body {
      height: 100%;
      background: var(--deep);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 48px 32px;
      text-align: center;
    }

    /* ── Mark ─────────────────────────────────────────────────── */
    .mark {
      width: 119px;
      height: 119px;
    }

    /* ── Brand block (name + rule + tagline aligned) ─────────── */
    .brand {
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
    }

    .name {
      font-family: "Cormorant Garamond", serif;
      font-weight: 400;
      font-size: 44px;
      letter-spacing: 0.18em;
      color: var(--cream);
      line-height: 1;
      white-space: nowrap;
      display: flex;
      justify-content: space-between;
    }
    .name span { display: inline-block; }

    /* ── Name/tag divider ─────────────────────────────────────── */
    .rule-name {
      border: none;
      border-top: 1px solid var(--bronze);
      opacity: 0.55;
      width: 100%;
    }

    /* ── Tagline ──────────────────────────────────────────────── */
    .tagline {
      font-family: "Inter", sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--cream);
      line-height: 1;
      display: flex;
      justify-content: space-between;
    }
    .tagline span { display: inline-block; }

    /* ── Section rule ─────────────────────────────────────────── */
    .rule {
      width: 100px;
      border: none;
      border-top: 1px solid var(--bronze);
      opacity: 0.55;
    }

    /* ── Coming soon ──────────────────────────────────────────── */
    .cs-label {
      font-family: "Inter", sans-serif;
      font-weight: 400;
      font-size: 33px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream);
      line-height: 1;
    }

    .cs-date {
      font-family: "Cormorant Garamond", serif;
      font-weight: 400;
      font-size: 120px;
      letter-spacing: 0.06em;
      color: var(--cream);
      line-height: 1;
    }

    /* ── Mark animation ───────────────────────────────────────── */
    @keyframes ag-pulse {
      0%, 100% { opacity: 1;    }
      50%       { opacity: 0.1; }
    }
    .mark use { animation: ag-pulse 3s ease-in-out infinite; }
    .mark use:nth-child(1) {animation-delay:1.54s}
    .mark use:nth-child(2) {animation-delay:1.35s}
    .mark use:nth-child(3) {animation-delay:1.28s}
