<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiGENTiA — Coming Soon</title>
  <link rel="stylesheet" href="aigentia-tokens.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--ag-deep);
      color: var(--ag-cream);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 48px 32px;
    }

    /* Logo lockup — centred, no side padding */
    .ag-lockup {
      padding: 0;
      background: transparent;
    }

    /* Coming soon block */
    .coming-soon {
      text-align: center;
    }

    .coming-soon-label {
      font-family: var(--ag-font-tag);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--ag-bronze);
      display: block;
      margin-bottom: 16px;
    }

    .coming-soon-date {
      font-family: var(--ag-font-name);
      font-size: 48px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--ag-cream);
      line-height: 1;
      display: block;
    }

    hr.ag-rule {
      width: 120px;
      border-top-color: var(--ag-bronze);
      opacity: 0.5;
      margin: 0 auto;
    }

    @media (max-width: 480px) {
      .coming-soon-date { font-size: 36px; }
      .ag-mark { width: 72px !important; height: 72px !important; min-width: 72px !important; }
      .ag-mark svg { width: 72px !important; height: 72px !important; }
    }
  </style>
</head>
