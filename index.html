<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AiGENTiA — Intelligent Agency. AI Management Agency specialising in agent design, deployment and governance.">
  <title>AiGENTiA — Intelligent Agency</title>

  <!-- Brand stylesheets (do not modify) -->
  <link rel="stylesheet" href="aigentia-tokens.css">
  <link rel="stylesheet" href="aigentia-brand.css">

  <!-- Application stylesheet -->
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="aigentia-assessments.css">
</head>
<body>

<div id="app">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside id="sidebar">

    <!-- Brand lockup (dark, inline static cream SVG + JS-controlled animation) -->
    <div class="ag-lockup" id="sidebar-lockup">
      <div class="ag-mark" id="sidebar-mark">
        <img id="sidebar-mark-img" src="aigentia-mark-deep.svg" alt="">
      </div><!-- /.ag-mark -->

      <div class="ag-text">
        <div class="ag-name-half">
          <div class="ag-name">
            <span>A</span><span>i</span><span>G</span><span>E</span>
            <span>N</span><span>T</span><span>i</span><span>A</span>
          </div>
        </div>
        <div class="ag-accent"></div>
        <div class="ag-tag-half">
          <div class="ag-tag">
            <span>I</span><span>N</span><span>T</span><span>E</span>
            <span>L</span><span>L</span><span>I</span><span>G</span>
            <span>E</span><span>N</span><span>T</span>
            <span class="ag-w"></span>
            <span>A</span><span>G</span><span>E</span><span>N</span>
            <span>C</span><span>Y</span>
          </div>
        </div>
      </div><!-- /.ag-text -->
    </div><!-- /.ag-lockup -->

    <hr class="sidebar-rule">

    <!-- Scrollable middle: nav items + explore section -->
    <div id="sidebar-scroll">

      <nav id="sidebar-nav" aria-label="Primary navigation"></nav>

      <div id="sidebar-socials">
        <a href="https://youtube.com/@aigentia"           target="_blank" class="social-link" aria-label="YouTube">YT</a>
        <a href="https://tiktok.com/@aigentia"            target="_blank" class="social-link" aria-label="TikTok">TT</a>
        <a href="https://linkedin.com/company/aigentia"   target="_blank" class="social-link" aria-label="LinkedIn">LI</a>
        <a href="https://instagram.com/aigentia.official" target="_blank" class="social-link" aria-label="Instagram">IG</a>
      </div>

      <hr class="sidebar-rule sidebar-section-rule">

      <div id="sidebar-explore-section">
        <div class="sidebar-starters-label">Explore</div>
        <div id="sidebar-explore" role="group" aria-label="Explore topics"></div>
      </div>

    </div><!-- /#sidebar-scroll -->

    <!-- Footer: theme + collapse -->
    <div id="sidebar-footer">
      <div class="theme-toggle" id="theme-toggle" role="button" tabindex="0" aria-label="Toggle theme">
        <svg data-lucide="monitor" stroke-width="1.5" aria-hidden="true"></svg>
        <span id="theme-label">System</span>
      </div>
      <div class="sidebar-collapse" id="sidebar-collapse" role="button" tabindex="0" aria-label="Collapse sidebar">
        <svg data-lucide="panel-left-close" stroke-width="1.5" aria-hidden="true"></svg>
        <span class="sidebar-collapse-label">Collapse</span>
      </div>
    </div>

  </aside><!-- /#sidebar -->

  <!-- Mobile overlay (closes expanded sidebar on tap) -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- Mobile sidebar toggle (hidden via CSS — icon strip replaces it) -->
  <button id="sidebar-toggle" aria-label="Open navigation" aria-expanded="false">
    <svg data-lucide="panel-left" stroke-width="1.5" width="18" height="18"></svg>
  </button>

  <!-- ── Central Canvas ──────────────────────────────────── -->
  <main id="canvas" role="main">

    <!-- Hero: shown before first conversation -->
    <div id="canvas-hero">
      <div id="hero-mark">
        <img id="hero-mark-img" src="aigentia-mark-deep.svg" alt="">
      </div>
      <div id="hero-text">
        <div id="hero-name">
          <span>A</span><span>i</span><span>G</span><span>E</span>
          <span>N</span><span>T</span><span>i</span><span>A</span>
        </div>
        <div id="hero-accent"></div>
        <div id="hero-tag">
          <span>I</span><span>N</span><span>T</span><span>E</span>
          <span>L</span><span>L</span><span>I</span><span>G</span>
          <span>E</span><span>N</span><span>T</span>
          <span class="hero-w"></span>
          <span>A</span><span>G</span><span>E</span><span>N</span>
          <span>C</span><span>Y</span>
        </div>
      </div>
      <div id="hero-starters"></div>
    </div>

    <!-- Header: shown when conversation is active -->
    <div id="canvas-header">
      <span id="canvas-header-name">AiGENTiA</span>
      <div id="theme-btn" role="button" tabindex="0" aria-label="Toggle theme">
        <svg data-lucide="sun" stroke-width="1.5" aria-hidden="true"></svg>
        <span id="theme-btn-label">Light</span>
      </div>
    </div>

    <!-- Chat row: mark beside the window (mark hidden in empty state) -->
    <div id="canvas-chat-row">
      <div id="chat-mark-col">
        <img id="chat-mark-img" src="aigentia-mark-deep.svg" alt="">
      </div>

      <!-- Chat window -->
      <div id="chat-window">

        <!-- Conversation thread -->
        <div id="thread" aria-live="polite" aria-label="Conversation">
          <div class="thread-inner" id="thread-inner">
            <div id="thread-spacer"></div>
          </div>
        </div>

        <!-- Prompt area -->
        <div id="prompt-area">
          <div class="prompt-inner">
            <div class="input-row">
              <textarea
                id="input-field"
                rows="1"
                placeholder="Ask anything about AI agents, governance, or AiGENTiA…"
                aria-label="Message input"
                autocomplete="off"
                spellcheck="false"
              ></textarea>
              <button id="send-btn" aria-label="Send message">
                <svg data-lucide="arrow-up" stroke-width="2"></svg>
              </button>
            </div>
          </div><!-- /.prompt-inner -->
        </div><!-- /#prompt-area -->

      </div><!-- /#chat-window -->
    </div><!-- /#canvas-chat-row -->

  </main><!-- /#canvas -->

</div><!-- /#app -->

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- Content & Assessments -->
<script src="content.js"></script>
<script src="aigentia-assessments.js"></script>

<!-- Application controller -->
<script src="app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) lucide.createIcons();
  });
</script>

</body>
</html>
