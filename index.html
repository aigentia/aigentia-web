        </div>

    </div><!-- /#sidebar-scroll -->

    <!-- Footer: theme + collapse -->
    <div id="sidebar-footer">
      <div class="theme-toggle" id="theme-toggle" role="button" tabindex="0" aria-label="Toggle theme">
        <svg data-lucide="monitor" stroke-width="1.5" aria-hidden="true"></svg>
        <span id="theme-label">System</span>
      </div>
      <div class="sidebar-collapse" id="sidebar-collapse" role="button" tabindex="0" aria-label="Collapse sidebar">
        <svg data-lucide="panel-left-close" stroke-width="1.5" aria-hidden="true"></svg>
        <span class="sidebar-collapse-label">Collapse</span>
      </div>
    </div>

  </aside><!-- /#sidebar -->

  <!-- Mobile overlay (closes expanded sidebar on tap) -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- Mobile sidebar toggle (hidden via CSS — icon strip replaces it) -->
  <button id="sidebar-toggle" aria-label="Open navigation" aria-expanded="false">
    <svg data-lucide="panel-left" stroke-width="1.5" width="18" height="18"></svg>
  </button>

  <!-- ── Central Canvas ──────────────────────────────────── -->
  <main id="canvas" role="main">

    <!-- Hero: shown before first conversation -->
    <div id="canvas-hero">
      <div id="hero-mark">
        <img id="hero-mark-img" src="aigentia-mark-animated-deep.svg" alt="">
      </div>
      <div id="hero-text">
        <div id="hero-name">
          <span>A</span><span>i</span><span>G</span><span>E</span>
          <span>N</span><span>T</span><span>i</span><span>A</span>
        </div>
        <div id="hero-accent"></div>
        <div id="hero-tag">
          <span>I</span><span>N</span><span>T</span><span>E</span>
          <span>L</span><span>L</span><span>I</span><span>G</span>
          <span>E</span><span>N</span><span>T</span>
          <span class="hero-w"></span>
          <span>A</span><span>G</span><span>E</span><span>N</span>
          <span>C</span><span>Y</span>
        </div>
      </div>
      <div id="hero-starters"></div>
    </div>

    <!-- Header: shown when conversation is active -->
    <div id="canvas-header">
      <span id="canvas-header-name">AiGENTiA</span>
      <div id="theme-btn" role="button" tabindex="0" aria-label="Toggle theme">
        <svg data-lucide="sun" stroke-width="1.5" aria-hidden="true"></svg>
        <span id="theme-btn-label">Light</span>
      </div>
    </div>

    <!-- Chat row -->
    <div id="canvas-chat-row">

      <!-- Chat window -->
      <div id="chat-window">

        <!-- Conversation thread -->
        <div id="thread" aria-live="polite" aria-label="Conversation">
          <div class="thread-inner" id="thread-inner">
            <div id="thread-spacer"></div>
          </div>
        </div>

        <!-- Prompt area -->
        <div id="prompt-area">
          <div class="prompt-inner">
            <div class="input-row">
              <img id="chat-mark-img" src="aigentia-mark-deep.svg" alt="" aria-hidden="true">
              <textarea
                id="input-field"
                rows="1"
                placeholder="Ask anything about AI agents, governance, or AiGENTiA…"
                aria-label="Message input"
                autocomplete="off"
                spellcheck="false"
              ></textarea>
              <button id="send-btn" aria-label="Send message">
                <svg data-lucide="arrow-up" stroke-width="2"></svg>
              </button>
            </div>
          </div><!-- /.prompt-inner -->
        </div><!-- /#prompt-area -->

      </div><!-- /#chat-window -->
    </div><!-- /#canvas-chat-row -->

  </main><!-- /#canvas -->

</div><!-- /#app -->

  });
</script>
